name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Test CLI Generation
        run: |
          OUTPUT_DIR="$(pwd)/test-output"
          node dist/index.js create \
            --name "test" \
            --dir "$OUTPUT_DIR" \
            --build-tool "maven" \
            --language "kotlin" \
            --platform "purpurmc" \
            --version "1.21.1" \
            --ide "intellij" \
            --group-id "com.example" \
            --artifact-id "test" \
            --yes
        env:
          CI: true

      - name: Verify Output
        run: |
          echo "🔍 Checking root directory..."
          ls -R test-output/
          PROJECT_PATH=$(find test-output -name "pom.xml" -exec dirname {} \;)
          if [ -z "$PROJECT_PATH" ]; then
            echo "❌ Could not find pom.xml in test-output/"
            exit 1
          fi
          echo "✅ Found project at: $PROJECT_PATH"
          grep -q "com.example" "$PROJECT_PATH/pom.xml" && echo "✅ pom.xml placeholders replaced" || exit 1
        shell: bash
