name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Test CLI Commands
        run: |
          if node dist/index.js create \
            --name "test" \
            --dir "/tmp" \
            --build-tool "maven" \
            --language "kotlin" \
            --platform "purpurmc" \
            --version "1.21.11" \
            --ide "intellij" \
            --group-id "com.example" \
            --artifact-id "test" \
            --yes 2>&1 | grep -q "🎉 test created"; then
            echo "✅ Success path works"
          else
            echo "❌ Expected success message missing"
            exit 1
          fi
          
          if node dist/index.js create \
            --name "fail" \
            --dir "/tmp" \
            --build-tool "maven" \
            --language "kotlin" \
            --platform "fake" \
            --version "999" \
            --ide "intellij" \
            --group-id "com.example" \
            --artifact-id "fail" \
            --yes 2>&1 | grep -q "No built-in template found"; then
            echo "✅ Error path works"
          else
            echo "❌ Expected error message missing"
            exit 1
          fi
          
          node dist/index.js list | grep -q "maven / kotlin / purpurmc / 1.21.11" || exit 1
          echo "✅ All CLI paths work"
        env:
          CI: true